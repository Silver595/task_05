name: Portfolio CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch


jobs:
  build:
    name: build & test
    runs_on: ubuntu:latest

    steps:
      - name: checkout code
        uses: actions/setup-node@v4

      - name: Setup Node js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: lint
        run: npm run lint
        continue-on-error:true

      - name: build
        run: npm run build


      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retantion-days: 1
